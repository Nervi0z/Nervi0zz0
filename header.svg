<svg width="100%" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&amp;family=Inter:wght@300;400;600&amp;display=swap');

      .bg { fill: #050816; }
      .grid-line { stroke: #0f1729; stroke-width: 0.5; }

      /* Scan line animation */
      .scanline {
        fill: none;
        stroke: url(#scanGrad);
        stroke-width: 1.5;
        animation: scan 4s linear infinite;
        opacity: 0.6;
      }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        5%   { opacity: 0.6; }
        95%  { opacity: 0.6; }
        100% { transform: translateY(290px); opacity: 0; }
      }

      /* Glow pulse on name */
      .name-glow {
        animation: glowPulse 3s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 12px #7C3AED) drop-shadow(0 0 24px #7C3AED40); }
        50%       { filter: drop-shadow(0 0 20px #7C3AED) drop-shadow(0 0 40px #7C3AED60); }
      }

      /* Fade in text blocks */
      .fade-line-1 { animation: fadeUp 0.8s ease forwards; opacity: 0; animation-delay: 0.3s; }
      .fade-line-2 { animation: fadeUp 0.8s ease forwards; opacity: 0; animation-delay: 0.7s; }
      .fade-line-3 { animation: fadeUp 0.8s ease forwards; opacity: 0; animation-delay: 1.1s; }
      .fade-line-4 { animation: fadeUp 0.8s ease forwards; opacity: 0; animation-delay: 1.5s; }
      .fade-line-5 { animation: fadeUp 0.8s ease forwards; opacity: 0; animation-delay: 1.9s; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Cursor blink */
      .cursor {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Dot pulse */
      .dot-1 { animation: dotPulse 2s ease-in-out infinite; }
      .dot-2 { animation: dotPulse 2s ease-in-out infinite 0.4s; }
      .dot-3 { animation: dotPulse 2s ease-in-out infinite 0.8s; }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.2; r: 2; }
        50%       { opacity: 1;   r: 3; }
      }

      /* Corner bracket draw */
      .bracket { stroke-dasharray: 40; stroke-dashoffset: 40; animation: drawBracket 0.6s ease forwards; }
      .bracket-1 { animation-delay: 0.1s; }
      .bracket-2 { animation-delay: 0.2s; }
      .bracket-3 { animation-delay: 0.3s; }
      .bracket-4 { animation-delay: 0.4s; }
      @keyframes drawBracket {
        to { stroke-dashoffset: 0; }
      }

      /* Side bar slide */
      .sidebar-bar { animation: slideIn 1s ease forwards; opacity: 0; }
      .sb-1 { animation-delay: 0.5s; }
      .sb-2 { animation-delay: 0.7s; }
      .sb-3 { animation-delay: 0.9s; }
      @keyframes slideIn {
        from { opacity: 0; transform: scaleY(0); transform-origin: top; }
        to   { opacity: 1; transform: scaleY(1); }
      }

      /* Gradient line flow */
      .flow-line { animation: flowAnim 3s linear infinite; }
      @keyframes flowAnim {
        0%   { stroke-dashoffset: 200; }
        100% { stroke-dashoffset: 0; }
      }

      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .sans { font-family: 'Inter', system-ui, sans-serif; }
    </style>

    <!-- Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#050816" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7C3AED" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#06B6D4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E6EDF3"/>
      <stop offset="50%"  stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bottomGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#050816" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="80%"  stop-color="#06B6D4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg"/>

  <!-- Grid -->
  <g opacity="0.4">
    <!-- Vertical lines -->
    <line x1="75"  y1="0" x2="75"  y2="280" class="grid-line"/>
    <line x1="150" y1="0" x2="150" y2="280" class="grid-line"/>
    <line x1="225" y1="0" x2="225" y2="280" class="grid-line"/>
    <line x1="300" y1="0" x2="300" y2="280" class="grid-line"/>
    <line x1="375" y1="0" x2="375" y2="280" class="grid-line"/>
    <line x1="450" y1="0" x2="450" y2="280" class="grid-line"/>
    <line x1="525" y1="0" x2="525" y2="280" class="grid-line"/>
    <line x1="600" y1="0" x2="600" y2="280" class="grid-line"/>
    <line x1="675" y1="0" x2="675" y2="280" class="grid-line"/>
    <line x1="750" y1="0" x2="750" y2="280" class="grid-line"/>
    <line x1="825" y1="0" x2="825" y2="280" class="grid-line"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="40"  x2="900" y2="40"  class="grid-line"/>
    <line x1="0" y1="80"  x2="900" y2="80"  class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="900" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="900" y2="240" class="grid-line"/>
  </g>

  <!-- Scan line -->
  <line x1="0" y1="0" x2="900" y2="0" class="scanline"/>

  <!-- Corner brackets top-left -->
  <polyline points="30,16 16,16 16,30" fill="none" stroke="#7C3AED" stroke-width="2" class="bracket bracket-1"/>
  <!-- Corner brackets top-right -->
  <polyline points="870,16 884,16 884,30" fill="none" stroke="#7C3AED" stroke-width="2" class="bracket bracket-2"/>
  <!-- Corner brackets bottom-left -->
  <polyline points="30,264 16,264 16,250" fill="none" stroke="#06B6D4" stroke-width="2" class="bracket bracket-3"/>
  <!-- Corner brackets bottom-right -->
  <polyline points="870,264 884,264 884,250" fill="none" stroke="#06B6D4" stroke-width="2" class="bracket bracket-4"/>

  <!-- Left sidebar bars -->
  <rect x="28" y="50"  width="3" height="60" fill="url(#barGrad)" class="sidebar-bar sb-1"/>
  <rect x="34" y="70"  width="3" height="40" fill="url(#barGrad)" class="sidebar-bar sb-2"/>
  <rect x="40" y="85"  width="3" height="25" fill="url(#barGrad)" class="sidebar-bar sb-3"/>

  <!-- Right sidebar bars -->
  <rect x="869" y="50"  width="3" height="60" fill="url(#barGrad)" class="sidebar-bar sb-1"/>
  <rect x="863" y="70"  width="3" height="40" fill="url(#barGrad)" class="sidebar-bar sb-2"/>
  <rect x="857" y="85"  width="3" height="25" fill="url(#barGrad)" class="sidebar-bar sb-3"/>

  <!-- Top accent line -->
  <line x1="60" y1="8" x2="840" y2="8" stroke="url(#mainGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Prompt indicator -->
  <text x="62" y="52" class="mono fade-line-1" fill="#7C3AED" font-size="11" opacity="0.8">~/security $</text>
  <text x="148" y="52" class="mono fade-line-1" fill="#06B6D4" font-size="11">whoami</text>

  <!-- Main name -->
  <text x="60" y="115" class="mono name-glow fade-line-2"
    fill="url(#nameGrad)"
    font-size="52"
    font-weight="700"
    letter-spacing="2">Miguel Alameda</text>

  <!-- Cursor after name -->
  <rect x="715" y="82" width="3" height="38" fill="#7C3AED" class="cursor fade-line-2"/>

  <!-- Handle -->
  <text x="62" y="145" class="mono fade-line-3" fill="#475569" font-size="14" letter-spacing="1">@Nervi0z</text>

  <!-- Divider line -->
  <line x1="62" y1="158" x2="500" y2="158" stroke="url(#mainGrad)" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.5" class="fade-line-3"/>

  <!-- Role line -->
  <text x="62" y="182" class="sans fade-line-4" fill="#94A3B8" font-size="13" letter-spacing="0.5">
    Security Analyst · Vulnerability Management · Blue Team
  </text>

  <!-- Company + location -->
  <text x="62" y="204" class="mono fade-line-4" fill="#475569" font-size="11">
    <tspan fill="#7C3AED">▸</tspan>  VAR Group · Madrid, Spain
  </text>

  <!-- Tags row -->
  <g class="fade-line-5">
    <!-- BTL1 tag -->
    <rect x="62"  y="218" width="70" height="20" rx="3" fill="#7C3AED" fill-opacity="0.15" stroke="#7C3AED" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="97"  y="232" class="mono" fill="#A78BFA" font-size="10" text-anchor="middle">BTL1 Gold</text>

    <!-- SAL1 tag -->
    <rect x="140" y="218" width="56" height="20" rx="3" fill="#22C55E" fill-opacity="0.12" stroke="#22C55E" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="168" y="232" class="mono" fill="#4ADE80" font-size="10" text-anchor="middle">SAL1</text>

    <!-- VM tag -->
    <rect x="204" y="218" width="120" height="20" rx="3" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="264" y="232" class="mono" fill="#22D3EE" font-size="10" text-anchor="middle">Vuln Management</text>

    <!-- Detection tag -->
    <rect x="332" y="218" width="74" height="20" rx="3" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="369" y="232" class="mono" fill="#F87171" font-size="10" text-anchor="middle">Detection</text>
  </g>

  <!-- Animated dots bottom left -->
  <circle cx="62"  cy="256" r="2" fill="#7C3AED" class="dot-1"/>
  <circle cx="70"  cy="256" r="2" fill="#7C3AED" class="dot-2"/>
  <circle cx="78"  cy="256" r="2" fill="#06B6D4" class="dot-3"/>

  <!-- Bottom tagline -->
  <text x="90" y="259" class="mono fade-line-5" fill="#334155" font-size="10" letter-spacing="1">find it // prove it // chase the fix</text>

  <!-- Bottom accent line -->
  <line x1="60" y1="272" x2="840" y2="272" stroke="url(#bottomGrad)" stroke-width="1"/>
</svg>

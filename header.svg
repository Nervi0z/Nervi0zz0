<svg width="100%" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #020810; }

      /* Fine grid */
      .g { stroke: #0a1628; stroke-width: 0.4; }

      /* Scanline sweep */
      .scan {
        fill: none;
        stroke: url(#sg);
        stroke-width: 1.2;
        animation: sweep 5s linear infinite;
        opacity: 0;
      }
      @keyframes sweep {
        0%   { transform: translateY(0px);   opacity: 0; }
        3%   { opacity: 0.7; }
        97%  { opacity: 0.5; }
        100% { transform: translateY(330px); opacity: 0; }
      }

      /* Particle flicker */
      .p { animation: flicker var(--d,3s) ease-in-out infinite; }
      @keyframes flicker {
        0%,100% { opacity: 0.08; }
        50%      { opacity: var(--op, 0.6); }
      }

      /* Name reveal */
      .name {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-weight: 700;
        font-size: 56px;
        letter-spacing: 3px;
        fill: url(#ng);
        filter: url(#glow);
        animation: nameIn 1s cubic-bezier(0.16,1,0.3,1) forwards, nameGlow 4s ease-in-out 1s infinite;
        opacity: 0;
      }
      @keyframes nameIn {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes nameGlow {
        0%,100% { filter: url(#glow);       }
        50%      { filter: url(#glowStrong); }
      }

      /* Text cascade */
      .t1 { animation: tIn 0.7s ease forwards 0.2s; opacity:0; }
      .t2 { animation: tIn 0.7s ease forwards 0.5s; opacity:0; }
      .t3 { animation: tIn 0.7s ease forwards 0.9s; opacity:0; }
      .t4 { animation: tIn 0.7s ease forwards 1.3s; opacity:0; }
      .t5 { animation: tIn 0.7s ease forwards 1.7s; opacity:0; }
      .t6 { animation: tIn 0.7s ease forwards 2.1s; opacity:0; }
      @keyframes tIn {
        from { opacity:0; transform:translateX(-8px); }
        to   { opacity:1; transform:translateX(0); }
      }

      /* Cursor blink */
      .cur { animation: cur 1.1s step-end infinite 2.5s; opacity:0; }
      @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

      /* Bracket draw */
      .br {
        fill: none;
        stroke-width: 1.8;
        stroke-dasharray: 50;
        stroke-dashoffset: 50;
        animation: draw 0.5s ease forwards;
      }
      .br1 { stroke:#7C3AED; animation-delay:0.05s; }
      .br2 { stroke:#7C3AED; animation-delay:0.12s; }
      .br3 { stroke:#06B6D4; animation-delay:0.19s; }
      .br4 { stroke:#06B6D4; animation-delay:0.26s; }
      @keyframes draw { to { stroke-dashoffset: 0; } }

      /* Side accent bars */
      .bar {
        animation: barIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
        transform-origin: top;
        transform: scaleY(0);
        opacity: 0;
      }
      .b1 { animation-delay: 0.4s; }
      .b2 { animation-delay: 0.55s; }
      .b3 { animation-delay: 0.7s; }
      @keyframes barIn {
        to { transform: scaleY(1); opacity: 1; }
      }

      /* Horizontal flow lines */
      .flow {
        stroke-dasharray: 60 400;
        stroke-dashoffset: 460;
        animation: flowMove 6s linear infinite;
      }
      .flow2 { animation-delay: -3s; }
      @keyframes flowMove {
        to { stroke-dashoffset: -460; }
      }

      /* Tag pop */
      .tag { animation: tagPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; opacity:0; }
      .tg1 { animation-delay: 2.0s; }
      .tg2 { animation-delay: 2.15s; }
      .tg3 { animation-delay: 2.30s; }
      .tg4 { animation-delay: 2.45s; }
      .tg5 { animation-delay: 2.60s; }
      @keyframes tagPop {
        from { opacity:0; transform:scale(0.7); }
        to   { opacity:1; transform:scale(1); }
      }

      /* Dot pulse */
      .dot { animation: dp var(--dd,2s) ease-in-out infinite; }
      @keyframes dp { 0%,100%{opacity:0.2;} 50%{opacity:1;} }

      .mono { font-family: 'JetBrains Mono','Courier New',monospace; }
      .sans { font-family: 'Inter',system-ui,sans-serif; }
    </style>

    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F1F5F9"/>
      <stop offset="45%"  stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#020810" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#7C3AED" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#06B6D4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#020810" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#020810" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="900" height="320" class="bg"/>

  <!-- Subtle radial vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#0d1f3c" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="320" fill="url(#vig)"/>

  <!-- Grid -->
  <g opacity="1">
    <line x1="60"  y1="0" x2="60"  y2="320" class="g"/>
    <line x1="120" y1="0" x2="120" y2="320" class="g"/>
    <line x1="180" y1="0" x2="180" y2="320" class="g"/>
    <line x1="240" y1="0" x2="240" y2="320" class="g"/>
    <line x1="300" y1="0" x2="300" y2="320" class="g"/>
    <line x1="360" y1="0" x2="360" y2="320" class="g"/>
    <line x1="420" y1="0" x2="420" y2="320" class="g"/>
    <line x1="480" y1="0" x2="480" y2="320" class="g"/>
    <line x1="540" y1="0" x2="540" y2="320" class="g"/>
    <line x1="600" y1="0" x2="600" y2="320" class="g"/>
    <line x1="660" y1="0" x2="660" y2="320" class="g"/>
    <line x1="720" y1="0" x2="720" y2="320" class="g"/>
    <line x1="780" y1="0" x2="780" y2="320" class="g"/>
    <line x1="840" y1="0" x2="840" y2="320" class="g"/>
    <line x1="0" y1="40"  x2="900" y2="40"  class="g"/>
    <line x1="0" y1="80"  x2="900" y2="80"  class="g"/>
    <line x1="0" y1="120" x2="900" y2="120" class="g"/>
    <line x1="0" y1="160" x2="900" y2="160" class="g"/>
    <line x1="0" y1="200" x2="900" y2="200" class="g"/>
    <line x1="0" y1="240" x2="900" y2="240" class="g"/>
    <line x1="0" y1="280" x2="900" y2="280" class="g"/>
  </g>

  <!-- Floating particles -->
  <circle cx="820" cy="45"  r="1.5" fill="#7C3AED" style="--d:2.3s;--op:0.8" class="p"/>
  <circle cx="840" cy="90"  r="1"   fill="#06B6D4" style="--d:3.1s;--op:0.6" class="p"/>
  <circle cx="800" cy="130" r="2"   fill="#7C3AED" style="--d:2.7s;--op:0.9" class="p"/>
  <circle cx="855" cy="170" r="1.5" fill="#22D3EE" style="--d:4s;--op:0.7"   class="p"/>
  <circle cx="870" cy="60"  r="1"   fill="#A78BFA" style="--d:3.5s;--op:0.5" class="p"/>
  <circle cx="880" cy="210" r="1.5" fill="#7C3AED" style="--d:2.1s;--op:0.8" class="p"/>
  <circle cx="35"  cy="200" r="1.5" fill="#06B6D4" style="--d:3.3s;--op:0.6" class="p"/>
  <circle cx="20"  cy="140" r="1"   fill="#7C3AED" style="--d:2.8s;--op:0.7" class="p"/>
  <circle cx="50"  cy="80"  r="2"   fill="#22D3EE" style="--d:3.7s;--op:0.5" class="p"/>

  <!-- Scan line -->
  <line x1="0" y1="0" x2="900" y2="0" class="scan"/>

  <!-- Corner brackets -->
  <polyline points="74,12 12,12 12,74"   class="br br1"/>
  <polyline points="826,12 888,12 888,74" class="br br2"/>
  <polyline points="74,308 12,308 12,246" class="br br3"/>
  <polyline points="826,308 888,308 888,246" class="br br4"/>

  <!-- Left accent bars -->
  <rect x="26" y="90"  width="4" height="80" rx="2" fill="url(#bg1)" class="bar b1"/>
  <rect x="34" y="110" width="4" height="55" rx="2" fill="url(#bg1)" class="bar b2" style="opacity:0.6"/>
  <rect x="42" y="125" width="4" height="35" rx="2" fill="url(#bg1)" class="bar b3" style="opacity:0.4"/>

  <!-- Right accent bars -->
  <rect x="870" y="90"  width="4" height="80" rx="2" fill="url(#bg2)" class="bar b1"/>
  <rect x="862" y="110" width="4" height="55" rx="2" fill="url(#bg2)" class="bar b2" style="opacity:0.6"/>
  <rect x="854" y="125" width="4" height="35" rx="2" fill="url(#bg2)" class="bar b3" style="opacity:0.4"/>

  <!-- Top flow line -->
  <line x1="0" y1="9" x2="900" y2="9" stroke="url(#tline)" stroke-width="0.8"/>
  <!-- Animated flow on top line -->
  <line x1="0" y1="9" x2="900" y2="9" stroke="url(#sg)" stroke-width="1.5" class="flow" opacity="0.6"/>
  <line x1="0" y1="9" x2="900" y2="9" stroke="url(#sg)" stroke-width="1.5" class="flow flow2" opacity="0.4"/>

  <!-- Prompt -->
  <text x="66" y="56" class="mono t1" fill="#334155" font-size="11">~/security/analysts/madrid</text>
  <text x="280" y="56" class="mono t1" fill="#7C3AED" font-size="11"> $</text>
  <text x="298" y="56" class="mono t1" fill="#475569" font-size="11"> cat profile.md</text>

  <!-- Main name -->
  <text x="66" y="128" class="name">Miguel Alameda</text>

  <!-- Cursor -->
  <rect x="744" y="95" width="3" height="40" fill="#7C3AED" class="cur"/>

  <!-- Handle -->
  <text x="68" y="155" class="mono t3" fill="#3B4A6B" font-size="13" letter-spacing="1.5">@Nervi0z</text>

  <!-- Divider -->
  <line x1="66" y1="168" x2="620" y2="168" stroke="url(#hline)" stroke-width="0.7" class="t3"/>

  <!-- Role -->
  <text x="66" y="192" class="sans t4" fill="#64748B" font-size="13.5" letter-spacing="0.3">
    Security Analyst  ·  Vulnerability Management  ·  Blue Team
  </text>

  <!-- Company -->
  <text x="66" y="214" class="mono t4" font-size="11">
    <tspan fill="#7C3AED" filter="url(#softglow)">▸</tspan>
    <tspan fill="#1E293B" dx="4">VAR Group</tspan>
    <tspan fill="#334155" dx="6">·</tspan>
    <tspan fill="#1E293B" dx="6">Madrid, Spain</tspan>
  </text>

  <!-- Tags -->
  <!-- BTL1 Gold -->
  <g class="tag tg1">
    <rect x="66"  y="228" width="76" height="22" rx="4" fill="#7C3AED" fill-opacity="0.12" stroke="#7C3AED" stroke-width="0.8" stroke-opacity="0.7"/>
    <circle cx="80" cy="239" r="3" fill="#EAB308" opacity="0.9"/>
    <text x="104" y="243" class="mono" fill="#A78BFA" font-size="10" text-anchor="middle">BTL1 Gold</text>
  </g>
  <!-- SAL1 -->
  <g class="tag tg2">
    <rect x="150" y="228" width="52" height="22" rx="4" fill="#22C55E" fill-opacity="0.1" stroke="#22C55E" stroke-width="0.8" stroke-opacity="0.6"/>
    <circle cx="163" cy="239" r="3" fill="#22C55E" opacity="0.9"/>
    <text x="178" y="243" class="mono" fill="#4ADE80" font-size="10" text-anchor="middle">SAL1</text>
  </g>
  <!-- Vuln Mgmt -->
  <g class="tag tg3">
    <rect x="210" y="228" width="110" height="22" rx="4" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.5"/>
    <circle cx="223" cy="239" r="3" fill="#06B6D4" opacity="0.9"/>
    <text x="267" y="243" class="mono" fill="#22D3EE" font-size="10" text-anchor="middle">Vuln Management</text>
  </g>
  <!-- Detection -->
  <g class="tag tg4">
    <rect x="328" y="228" width="76" height="22" rx="4" fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-width="0.8" stroke-opacity="0.4"/>
    <circle cx="341" cy="239" r="3" fill="#EF4444" opacity="0.9"/>
    <text x="368" y="243" class="mono" fill="#F87171" font-size="10" text-anchor="middle">Detection</text>
  </g>
  <!-- SOC -->
  <g class="tag tg5">
    <rect x="412" y="228" width="52" height="22" rx="4" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-width="0.8" stroke-opacity="0.5"/>
    <circle cx="425" cy="239" r="3" fill="#8B5CF6" opacity="0.9"/>
    <text x="440" y="243" class="mono" fill="#A78BFA" font-size="10" text-anchor="middle">SOC</text>
  </g>

  <!-- Bottom dots + tagline -->
  <circle cx="66" cy="272" r="2.5" fill="#7C3AED" style="--dd:1.8s" class="dot"/>
  <circle cx="75" cy="272" r="2.5" fill="#7C3AED" style="--dd:2.2s" class="dot"/>
  <circle cx="84" cy="272" r="2.5" fill="#06B6D4" style="--dd:2.6s" class="dot"/>
  <text x="98"  y="276" class="mono t6" fill="#1E293B" font-size="10" letter-spacing="1.2">find it  //  prove it  //  chase the fix</text>

  <!-- Bottom line -->
  <line x1="60" y1="309" x2="840" y2="309" stroke="url(#hline)" stroke-width="0.8"/>
</svg>
